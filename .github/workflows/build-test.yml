name: LuminOS Build Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Check out repository code
      uses: actions/checkout@v4

    - name: Install build dependencies
      run: |
        sudo apt-get update
        PKGS="debootstrap squashfs-tools xorriso mtools curl rsync"
        for p in grub-pc-bin grub-efi-amd64-bin; do
          if apt-cache show $p >/dev/null 2>&1; then PKGS="$PKGS $p"; fi
        done
        sudo apt-get install -y $PKGS

    - name: Run the Master Build Script
      run: |
        chmod +x *.sh
        sudo ./build.sh
